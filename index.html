<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>golobe</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <div class="hero">
      <div class="hero-navbar">
        <div class="frame">
          <ul>
            <li>
              <i class="fa-solid fa-plane"></i><a href="#">Find Flight</a>
            </li>
            <li><i class="fa-solid fa-bed"></i><a href="#">Find Stays</a></li>
          </ul>
        </div>
        <div class="logo">
          <b><a href="#">golobe</a></b>
        </div>
        <div class="login">
          <ul>
            <li><a href="#">Login</a></li>
            <li><a href="#" class="sign-up">Sign up</a></li>
          </ul>
        </div>
      </div>
      <div class="hero-content">
        <h1 class="helping-other">Helping other</h1>
        <h1 class="live-travel">Live & travel</h1>
        <p>Special offers to suit your plan</p>
      </div>
    </div>

    <!-- form -->
    <form action="#">
      <ul class="find">
        <li class="li">
          <i class="fa-solid fa-plane"></i><a href="#">Find Flight</a>
        </li>
        <li><i class="fa-solid fa-bed"></i><a href="#">Find Stays</a></li>
      </ul>

      <div class="fieldset">
        <fieldset>
          <legend>From-to</legend>
          <input type="text" name="" id="" placeholder="Lahore - Karache" />
          <i class="fa-solid fa-right-left"></i>
        </fieldset>
        <fieldset>
          <legend>Trip</legend>
          <select name="" id="">
            <option value="return">Return</option>
            <option value="to_go">To go</option>
          </select>
        </fieldset>
        <fieldset>
          <legend>Depart-Return</legend>
          <input type="date" name="" id="" />
          <span> - </span>
          <input type="date" name="" id="" />
        </fieldset>
        <fieldset>
          <legend>Passenger-Class</legend>
          <input type="text" name="" id="" placeholder="1 Passenger, Economy" />
        </fieldset>
      </div>
      <ul class="submit">
        <li><a href="#">+ Add Promo Code</a></li>
        <li class="btn">
          <i class="fa-solid fa-paper-plane"></i
          ><input type="submit" value="Show Filghts" />
        </li>
      </ul>
    </form>
  </body>
</html>
